name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx prisma generate && npx tsc --noEmit

      - name: Unit tests
        run: npm run test
        continue-on-error: true

      - name: Build
        run: npx prisma generate && npx next build
        env:
          SKIP_ENV_VALIDATION: 'true'

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: License check
        run: npx license-checker --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0" --excludePrivatePackages
        continue-on-error: true
